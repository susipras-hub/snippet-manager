<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Reply v2 – Snippet Manager</title>
<style>
  :root {
    --bg: #1b1d22;
    --panel: #23262d;
    --panel-light: #2c2f37;
    --border: #3a3e47;
    --text: #e9e7e2;
    --text-dim: #9a9da5;
    --accent: #d9a05b;
    --accent-dim: #8a6a3f;
    --mono: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace;
    --sans: 'Inter', -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }
  .app { display: grid; grid-template-columns: 300px 1fr; height: 100vh; }
  .sidebar { background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-header h1 { margin: 0; font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .tag { font-family: var(--mono); font-size: 10px; color: var(--bg); background: var(--accent); padding: 2px 6px; border-radius: 3px; }
  .cat-manager { padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .cat-manager-title { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 8px; }
  .cat-add-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .cat-add-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; color: var(--text); padding: 6px 8px; font-size: 12px; font-family: var(--sans); }
  .cat-add-row input:focus { outline: none; border-color: var(--accent-dim); }
  .cat-add-btn { background: var(--accent); color: #2a1d0e; border: none; border-radius: 5px; padding: 6px 10px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .cat-add-btn:hover { background: #e6b274; }
  .cat-chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .cat-chip { display: flex; align-items: center; gap: 4px; font-family: var(--mono); font-size: 11px; padding: 3px 8px; border-radius: 100px; border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; transition: all 0.12s; }
  .cat-chip:hover { border-color: var(--accent-dim); color: var(--text); }
  .cat-chip.active { background: var(--accent); border-color: var(--accent); color: #2a1d0e; font-weight: 600; }
  .cat-chip .del { opacity: 0.5; font-size: 12px; line-height: 1; }
  .cat-chip .del:hover { opacity: 1; color: #d97373; }
  .search-box { padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .search-box input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 7px 10px; font-size: 13px; font-family: var(--sans); }
  .search-box input:focus { outline: none; border-color: var(--accent-dim); }
  .snippet-list { flex: 1; overflow-y: auto; padding: 6px; }
  .snippet-item { padding: 10px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; border: 1px solid transparent; }
  .snippet-item:hover { background: var(--panel-light); }
  .snippet-item.selected { background: var(--panel-light); border-color: var(--accent-dim); }
  .snippet-item .title { font-weight: 600; font-size: 13px; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .snippet-item .meta { font-family: var(--mono); font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
  .empty-list { padding: 24px 16px; color: var(--text-dim); font-size: 12px; text-align: center; line-height: 1.6; }
  .new-btn { margin: 10px; padding: 10px; border-radius: 6px; border: 1px dashed var(--border); background: transparent; color: var(--text-dim); font-size: 12px; font-family: var(--sans); cursor: pointer; text-align: center; transition: all 0.12s; }
  .new-btn:hover { border-color: var(--accent); color: var(--accent); }
  .main { display: flex; flex-direction: column; overflow: hidden; }
  .main-header { padding: 16px 28px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .main-header h2 { margin: 0; font-size: 15px; font-weight: 600; color: var(--text-dim); }
  .main-body { flex: 1; overflow-y: auto; padding: 28px; max-width: 760px; }
  .field { margin-bottom: 18px; }
  .field label { display: block; font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); margin-bottom: 6px; }
  .field input, .field textarea, .field select { width: 100%; background: var(--panel); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 10px 12px; font-size: 13px; font-family: var(--sans); }
  .field textarea { font-family: var(--mono); line-height: 1.6; min-height: 140px; resize: vertical; }
  .field select { cursor: pointer; }
  .field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: var(--accent-dim); }
  .field .hint { font-size: 11px; color: var(--text-dim); margin-top: 6px; line-height: 1.5; }
  .row { display: flex; gap: 16px; }
  .row .field { flex: 1; }
  .actions { display: flex; gap: 10px; margin-top: 8px; }
  button.primary { background: var(--accent); color: #2a1d0e; font-family: var(--sans); font-size: 13px; font-weight: 600; padding: 10px 18px; border-radius: 6px; cursor: pointer; border: none; }
  button.primary:hover { background: #e6b274; }
  button.secondary { background: transparent; border: 1px solid var(--border); color: var(--text); font-family: var(--sans); font-size: 13px; font-weight: 600; padding: 10px 18px; border-radius: 6px; cursor: pointer; }
  button.secondary:hover { border-color: var(--accent-dim); }
  button.danger { background: transparent; color: #d97373; border: 1px solid transparent; font-family: var(--sans); font-size: 13px; font-weight: 600; padding: 10px 18px; border-radius: 6px; cursor: pointer; }
  button.danger:hover { background: rgba(217,115,115,0.1); }
  .ticket { margin-top: 22px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .ticket-head { padding: 10px 16px; border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); display: flex; justify-content: space-between; }
  .placeholder-inputs { padding: 14px 16px; display: grid; gap: 10px; border-bottom: 1px solid var(--border); }
  .placeholder-inputs.empty { display: none; }
  .ph-row { display: flex; align-items: center; gap: 10px; }
  .ph-row .ph-label { font-family: var(--mono); font-size: 12px; color: var(--accent); min-width: 130px; flex-shrink: 0; }
  .ph-row input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 5px; color: var(--text); padding: 7px 10px; font-size: 12px; font-family: var(--sans); }
  .ph-row input:focus { outline: none; border-color: var(--accent-dim); }
  .ticket-output { padding: 16px; font-family: var(--mono); font-size: 13px; line-height: 1.7; white-space: pre-wrap; color: var(--text); }
  .ticket-output mark { background: rgba(217,160,91,0.18); color: var(--accent); border-radius: 3px; padding: 0 2px; }
  .ticket-foot { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; }
  .copy-btn { background: var(--accent); color: #2a1d0e; font-family: var(--sans); font-weight: 600; font-size: 13px; padding: 9px 16px; border-radius: 6px; border: none; cursor: pointer; transition: background 0.12s; }
  .copy-btn:hover { background: #e6b274; }
  .copy-btn.copied { background: #7fae8a; color: #1a2c1f; }
  .empty-state { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-dim); text-align: center; padding: 40px; }
  .empty-state .glyph { font-family: var(--mono); font-size: 32px; color: var(--accent-dim); margin-bottom: 16px; }
  .empty-state h3 { color: var(--text); font-size: 16px; margin: 0 0 8px; }
  .empty-state p { font-size: 12px; line-height: 1.7; max-width: 320px; margin: 0; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Quick Reply <span class="tag">v2</span></h1>
    </div>
    <div class="cat-manager">
      <div class="cat-manager-title">Kategorien verwalten</div>
      <div class="cat-add-row">
        <input type="text" id="newCatInput" placeholder="Neue Kategorie…">
        <button class="cat-add-btn" id="addCatBtn">+</button>
      </div>
      <div class="cat-chips" id="catChips"></div>
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Suchen…">
    </div>
    <div class="snippet-list" id="snippetList"></div>
    <button class="new-btn" id="newSnippetBtn">+ Neuer Textbaustein</button>
  </div>
  <div class="main">
    <div class="main-header">
      <h2 id="mainTitle">Textbaustein</h2>
      <div class="actions" id="headerActions"></div>
    </div>
    <div class="main-body" id="mainBody"></div>
  </div>
</div>
<script>
const STORAGE_KEY = 'quickreply_v2';
let state = { categories: [], snippets: [] };
let selectedId = null;
let activeCategory = null;
let searchTerm = '';
let mode = 'view';
const seedCategories = ['Allgemein', 'Technik', 'Abschluss'];
const seedSnippets = [
  { id: 'seed1', title: 'Begrüßung – Ticket Eingang', category: 'Allgemein', body: 'Hallo {Name},\n\nvielen Dank für Ihre Nachricht. Ihr Anliegen wurde unter der Ticketnummer {Ticketnummer} erfasst.\n\nViele Grüße\n{Agentname}' },
  { id: 'seed2', title: 'Passwort zurücksetzen', category: 'Technik', body: 'Hallo {Name},\n\num Ihr Passwort zurückzusetzen, klicken Sie bitte auf "Passwort vergessen" auf der Login-Seite.\n\nViele Grüße\n{Agentname}' },
  { id: 'seed3', title: 'Rückfrage – weitere Infos', category: 'Allgemein', body: 'Hallo {Name},\n\num Ihnen bei Ticket {Ticketnummer} weiterzuhelfen, benötigen wir noch:\n\n- {Information}\n\nViele Grüße\n{Agentname}' },
  { id: 'seed4', title: 'Vorgang abgeschlossen', category: 'Abschluss', body: 'Hallo {Name},\n\nIhr Anliegen (Ticket {Ticketnummer}) wurde erfolgreich bearbeitet.\n\nViele Grüße\n{Agentname}' }
];
function load() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) { state = JSON.parse(raw); return; } } catch(e) {}
  state = { categories: [...seedCategories], snippets: JSON.parse(JSON.stringify(seedSnippets)) };
}
function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }
function uid() { return 's' + Date.now() + Math.floor(Math.random()*1000); }
function escHtml(str) { return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function extractPlaceholders(text) { const m = text.match(/\{([^}]+)\}/g) || []; return [...new Set(m.map(x => x.slice(1,-1)))]; }
function filteredSnippets() {
  return state.snippets.filter(s => {
    const matchCat = !activeCategory || s.category === activeCategory;
    const term = searchTerm.toLowerCase();
    const matchSearch = !term || s.title.toLowerCase().includes(term) || s.body.toLowerCase().includes(term) || (s.category||'').toLowerCase().includes(term);
    return matchCat && matchSearch;
  });
}
function renderCatChips() {
  const el = document.getElementById('catChips');
  const allChip = `<span class="cat-chip ${activeCategory===null?'active':''}" data-cat="">Alle</span>`;
  const chips = state.categories.map(c => `<span class="cat-chip ${activeCategory===c?'active':''}" data-cat="${escHtml(c)}">${escHtml(c)}<span class="del" data-del="${escHtml(c)}"> ×</span></span>`).join('');
  el.innerHTML = allChip + chips;
  el.querySelectorAll('.cat-chip').forEach(chip => {
    chip.addEventListener('click', (e) => {
      if (e.target.classList.contains('del')) {
        const cat = e.target.dataset.del;
        if (confirm(`Kategorie "${cat}" löschen?`)) {
          state.snippets.forEach(s => { if (s.category === cat) s.category = state.categories[0] || 'Allgemein'; });
          state.categories = state.categories.filter(c => c !== cat);
          if (activeCategory === cat) activeCategory = null;
          save(); render();
        }
        return;
      }
      activeCategory = chip.dataset.cat || null; render();
    });
  });
}
function renderSnippetList() {
  const el = document.getElementById('snippetList');
  const list = filteredSnippets();
  if (list.length === 0) { el.innerHTML = `<div class="empty-list">Keine Textbausteine gefunden.</div>`; return; }
  el.innerHTML = list.map(s => `<div class="snippet-item ${s.id===selectedId?'selected':''}" data-id="${s.id}"><div class="title">${escHtml(s.title)}</div><div class="meta">${escHtml(s.category||'Allgemein')}</div></div>`).join('');
  el.querySelectorAll('.snippet-item').forEach(item => { item.addEventListener('click', () => { selectedId = item.dataset.id; mode = 'view'; render(); }); });
}
function renderMain() {
  const titleEl = document.getElementById('mainTitle');
  const bodyEl = document.getElementById('mainBody');
  const actionsEl = document.getElementById('headerActions');
  if (mode === 'edit') { renderEditForm(); return; }
  const snippet = state.snippets.find(s => s.id === selectedId);
  if (!snippet) {
    titleEl.textContent = 'Textbaustein'; actionsEl.innerHTML = '';
    bodyEl.innerHTML = `<div class="empty-state"><div class="glyph">{ }</div><h3>Kein Baustein ausgewählt</h3><p>Wähle links einen Textbaustein oder lege einen neuen an.</p></div>`;
    return;
  }
  titleEl.textContent = snippet.title;
  actionsEl.innerHTML = `<button class="secondary" id="editBtn">Bearbeiten</button><button class="danger" id="deleteBtn">Löschen</button>`;
  const placeholders = extractPlaceholders(snippet.body);
  const highlighted = escHtml(snippet.body).replace(/\{([^}]+)\}/g, '<mark>{$1}</mark>');
  bodyEl.innerHTML = `<div class="ticket"><div class="ticket-head"><span>${escHtml(snippet.category||'Allgemein')}</span><span>${placeholders.length} Platzhalter</span></div><div class="placeholder-inputs ${placeholders.length===0?'empty':''}" id="phInputs">${placeholders.map(p => `<div class="ph-row"><span class="ph-label">{${escHtml(p)}}</span><input type="text" data-ph="${escHtml(p)}" placeholder="${escHtml(p)} eingeben…"></div>`).join('')}</div><div class="ticket-output" id="ticketOutput">${highlighted}</div><div class="ticket-foot"><button class="copy-btn" id="copyBtn">📋 Kopieren</button></div></div>`;
  const inputs = bodyEl.querySelectorAll('[data-ph]');
  const outputEl = document.getElementById('ticketOutput');
  outputEl.dataset.rawText = snippet.body;
  function updatePreview() {
    let text = snippet.body;
    inputs.forEach(inp => { if (inp.value) { const re = new RegExp('\\{' + inp.dataset.ph.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\}','g'); text = text.replace(re, inp.value); } });
    outputEl.innerHTML = escHtml(text).replace(/\{([^}]+)\}/g,'<mark>{$1}</mark>');
    outputEl.dataset.rawText = text;
  }
  inputs.forEach(inp => inp.addEventListener('input', updatePreview));
  document.getElementById('copyBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(outputEl.dataset.rawText || snippet.body).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✓ Kopiert'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '📋 Kopieren'; btn.classList.remove('copied'); }, 1500);
    });
  });
  document.getElementById('editBtn').addEventListener('click', () => { mode = 'edit'; render(); });
  document.getElementById('deleteBtn').addEventListener('click', () => {
    if (confirm(`"${snippet.title}" wirklich löschen?`)) { state.snippets = state.snippets.filter(s => s.id !== snippet.id); save(); selectedId = null; mode = 'view'; render(); }
  });
}
function renderEditForm() {
  const titleEl = document.getElementById('mainTitle');
  const bodyEl = document.getElementById('mainBody');
  const actionsEl = document.getElementById('headerActions');
  const isNew = !state.snippets.find(s => s.id === selectedId);
  const snippet = isNew ? { id: selectedId, title: '', category: state.categories[0]||'', body: '' } : state.snippets.find(s => s.id === selectedId);
  titleEl.textContent = isNew ? 'Neuer Textbaustein' : 'Bearbeiten';
  actionsEl.innerHTML = '';
  const catOptions = state.categories.map(c => `<option value="${escHtml(c)}" ${c===snippet.category?'selected':''}>${escHtml(c)}</option>`).join('');
  bodyEl.innerHTML = `<div class="row"><div class="field"><label>Titel</label><input type="text" id="fTitle" value="${escHtml(snippet.title)}" placeholder="z.B. Begrüßung – Ticket Eingang"></div><div class="field"><label>Kategorie</label><select id="fCategory">${catOptions.length ? catOptions : '<option value="">– Keine Kategorien –</option>'}</select></div></div><div class="field"><label>Text</label><textarea id="fBody" placeholder="Hallo {Name}, ...">${escHtml(snippet.body)}</textarea><div class="hint">Platzhalter wie {Name} oder {Ticketnummer} in geschweiften Klammern werden automatisch erkannt.</div></div><div class="actions"><button class="primary" id="saveBtn">Speichern</button><button class="secondary" id="cancelBtn">Abbrechen</button></div>`;
  document.getElementById('saveBtn').addEventListener('click', () => {
    const title = document.getElementById('fTitle').value.trim();
    const category = document.getElementById('fCategory').value;
    const body = document.getElementById('fBody').value;
    if (!title || !body) { alert('Bitte Titel und Text ausfüllen.'); return; }
    if (isNew) { state.snippets.push({ id: selectedId, title, category, body }); }
    else { const idx = state.snippets.findIndex(s => s.id === selectedId); state.snippets[idx] = { ...state.snippets[idx], title, category, body }; }
    save(); mode = 'view'; render();
  });
  document.getElementById('cancelBtn').addEventListener('click', () => { if (isNew) selectedId = null; mode = 'view'; render(); });
}
function render() { renderCatChips(); renderSnippetList(); renderMain(); }
load(); save();
document.getElementById('addCatBtn').addEventListener('click', () => {
  const input = document.getElementById('newCatInput');
  const name = input.value.trim();
  if (!name) return;
  if (state.categories.includes(name)) { alert('Kategorie existiert bereits.'); return; }
  state.categories.push(name); input.value = ''; save(); render();
});
document.getElementById('newCatInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('addCatBtn').click(); });
document.getElementById('searchInput').addEventListener('input', (e) => { searchTerm = e.target.value; render(); });
document.getElementById('newSnippetBtn').addEventListener('click', () => {
  if (state.categories.length === 0) { alert('Bitte zuerst eine Kategorie anlegen.'); return; }
  selectedId = uid(); mode = 'edit'; render();
});
render();
</script>
</body>
</html>
